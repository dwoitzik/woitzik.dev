name: Crosspost to dev.to

on:
  push:
    branches: ["main"]
    paths:
      - "src/content/blog/*.mdx"

jobs:
  crosspost:
    name: "Crosspost new articles"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new blog posts
        id: new-posts
        run: |
          NEW=$(git diff --diff-filter=A --name-only HEAD~1 HEAD -- 'src/content/blog/*.mdx' 2>/dev/null || true)
          echo "Found new posts: $NEW"
          echo "posts<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check required secrets
        if: steps.new-posts.outputs.posts != ''
        run: |
          if [ -z "${{ secrets.DEVTO_API_KEY }}" ]; then
            echo "❌ DEVTO_API_KEY secret is not set — aborting crosspost"
            exit 1
          fi

      - name: Crosspost to dev.to
        if: steps.new-posts.outputs.posts != ''
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            slug=$(basename "$file" .mdx)
            echo "Crossposting: $slug"
            node scripts/crosspost.mjs "$slug" --devto
          done <<< "${{ steps.new-posts.outputs.posts }}"
