name: Crosspost to dev.to

on:
  push:
    branches: ["main"]
    paths:
      - "src/content/blog/*.mdx"
  schedule:
    - cron: "0 6 * * 1" # weekly safety net — catches anything that slipped through
  workflow_dispatch: {}

jobs:
  crosspost:
    name: "Crosspost articles"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.DEVTO_API_KEY }}" ]; then
            echo "⚠️  DEVTO_API_KEY secret is not set — skipping crosspost"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Crosspost all articles (dedup via dev.to canonical_url)
        if: steps.check-secrets.outputs.skip != 'true'
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          for file in src/content/blog/*.mdx; do
            slug=$(basename "$file" .mdx)
            echo "Checking: $slug"
            node scripts/crosspost.mjs "$slug"
          done
